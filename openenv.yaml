name: batch-optimizer-env
description: AI-driven manufacturing batch optimization

version: 1.0

entrypoint: env.environment:BatchEnvironment

observation_space:
  temperature: float
  pressure: float
  speed: float
  energy: float
  yield_rate: float
  quality: float

action_space:
  temperature_change: float
  pressure_change: float
  speed_change: float

reward_range: [0.0, 1.0]

tasks:
  - name: energy_optimization
    entrypoint: tasks:EnergyOptimizationTask
    description: Minimize energy consumption
    graders:
      - name: reward_threshold
        threshold: 0.5

  - name: yield_energy_balance
    entrypoint: tasks:YieldEnergyTask
    description: Balance yield and energy
    graders:
      - name: reward_threshold
        threshold: 0.5

  - name: full_optimization
    entrypoint: tasks:FullOptimizationTask
    description: Optimize yield, quality, and energy
    graders:
      - name: reward_threshold
        threshold: 0.5