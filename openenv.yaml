spec_version: 1

name: batch-optimizer-env
description: AI-driven manufacturing batch optimization environment

runtime: python

entrypoint: env.environment:BatchEnvironment

tasks:
  energy_optimization:
    entrypoint: env.tasks:EnergyOptimizationTask
    grader:
      type: reward_threshold
      threshold: 0.5

  yield_energy_balance:
    entrypoint: env.tasks:YieldEnergyTask
    grader:
      type: reward_threshold
      threshold: 0.5

  full_optimization:
    entrypoint: env.tasks:FullOptimizationTask
    grader:
      type: reward_threshold
      threshold: 0.5