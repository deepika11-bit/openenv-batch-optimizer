spec_version: 1

name: batch-optimizer-env
description: AI-driven manufacturing batch optimization environment

runtime: python

entrypoint: env.environment:BatchEnvironment

tasks:
  - id: energy_optimization
    entrypoint: tasks:EnergyOptimizationTask
    grader:
      type: reward_threshold
      threshold: 0.5

  - id: yield_energy_balance
    entrypoint: tasks:YieldEnergyTask
    grader:
      type: reward_threshold
      threshold: 0.5

  - id: full_optimization
    entrypoint: tasks:FullOptimizationTask
    grader:
      type: reward_threshold
      threshold: 0.5