spec_version: 1

name: batch-optimizer-env
description: AI-driven manufacturing batch optimization environment

runtime: python

entrypoint: environment:BatchEnvironment

tasks:
  - id: energy_optimization
    entrypoint: server.tasks:EnergyOptimizationTask
    grader:
      type: score

  - id: yield_energy_balance
    entrypoint: server.tasks:YieldEnergyTask
    grader:
      type: score

  - id: full_optimization
    entrypoint: server.tasks:FullOptimizationTask
    grader:
      type: score